<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a0f"/>
      <stop offset="60%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#12181f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: 'Geist Mono', 'JetBrains Mono', ui-monospace, monospace; }
      .sans { font-family: 'Geist', 'Inter', ui-sans-serif, system-ui; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1f2a37" stroke-width="1" opacity="0.4">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(88, 88)">
    <rect x="0" y="0" width="26" height="26" rx="4" fill="#58a6ff"/>
    <rect x="38" y="0" width="26" height="26" rx="4" fill="#58a6ff" opacity="0.55"/>
    <rect x="0" y="38" width="26" height="26" rx="4" fill="#58a6ff" opacity="0.55"/>
    <rect x="38" y="38" width="26" height="26" rx="4" fill="#58a6ff" opacity="0.9"/>
  </g>

  <!-- Brand wordmark -->
  <text x="180" y="128" class="mono" font-size="34" font-weight="600" fill="#e8edf4" letter-spacing="-0.5">binturong</text>

  <!-- Headline -->
  <text x="88" y="280" class="sans" font-size="78" font-weight="900" fill="#e8edf4" letter-spacing="-2">Spot config drift</text>
  <text x="88" y="368" class="sans" font-size="78" font-weight="900" fill="#58a6ff" letter-spacing="-2">before it bites.</text>

  <!-- Subheading -->
  <text x="88" y="428" class="sans" font-size="24" font-weight="400" fill="#6b7a8c">
    <tspan>Diff N .env files side-by-side. Catch missing keys in one glance.</tspan>
  </text>

  <!-- Install pill -->
  <g transform="translate(88, 478)">
    <rect x="0" y="0" width="440" height="62" rx="12" fill="#12181f" stroke="#1f2a37" stroke-width="1"/>
    <text x="24" y="40" class="mono" font-size="22" fill="#58a6ff">$ cargo install binturong</text>
  </g>

  <!-- Footer tag line -->
  <text x="88" y="590" class="mono" font-size="16" fill="#6b7a8c">Rust · No runtime · Single binary · MIT</text>

  <!-- Top right: matrix mini preview -->
  <g transform="translate(780, 180)" opacity="0.9">
    <rect x="0" y="0" width="340" height="270" rx="14" fill="#080c12" stroke="#1f2a37" stroke-width="1"/>
    <g transform="translate(18, 22)">
      <circle cx="6" cy="6" r="5" fill="#f85149" opacity="0.75"/>
      <circle cx="24" cy="6" r="5" fill="#d29922" opacity="0.75"/>
      <circle cx="42" cy="6" r="5" fill="#3fb950" opacity="0.75"/>
    </g>
    <g class="mono" font-size="13" font-family="Geist Mono, ui-monospace, monospace">
      <text x="18" y="68" fill="#6b7a8c">KEY           .env  .stg  .prd</text>
      <text x="18" y="96" fill="#e8edf4">APP_ENV       </text>
      <text x="158" y="96" fill="#3fb950">✓     ✓     ✓</text>
      <text x="18" y="122" fill="#e8edf4">DATABASE_URL  </text>
      <text x="158" y="122" fill="#3fb950">✓     ✓     ✓</text>
      <text x="18" y="148" fill="#d29922">LOG_LEVEL     </text>
      <text x="158" y="148" fill="#d29922">✓     ✓  </text>
      <text x="230" y="148" fill="#f85149">✗</text>
      <text x="18" y="174" fill="#d29922">REDIS_URL     </text>
      <text x="158" y="174" fill="#d29922">✓  </text>
      <text x="194" y="174" fill="#f85149">✗     ✗</text>
      <text x="18" y="200" fill="#d29922">STRIPE_KEY    </text>
      <text x="158" y="200" fill="#d29922">✓  </text>
      <text x="194" y="200" fill="#6b7a8c">○     </text>
      <text x="230" y="200" fill="#d29922">✓</text>
      <text x="18" y="236" fill="#f85149" font-weight="700">✗ 3/5 drifted</text>
    </g>
  </g>
</svg>
